services:
  - type: web
    name: taskearn-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: taskearn-db
          property: connectionString

databases:
  - name: taskearn-db
    databaseName: taskearn
    user: taskearn
