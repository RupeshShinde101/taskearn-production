[build]
  # Auto-stamp SW version and HTML asset query strings on each deploy to bust caches
  command = "node netlify-build.js"
  publish = "."
  functions = "netlify/functions"

# Environment variables for production
[context.production.environment]
  BACKEND_URL = "https://taskearn-production-production.up.railway.app"

# Environment variables for deploy-preview
[context.deploy-preview.environment]
  BACKEND_URL = "https://taskearn-production-production.up.railway.app"

# 301 redirect: Netlify subdomain → primary domain (non-www)
[[redirects]]
  from = "https://workmate4u.netlify.app/*"
  to = "https://workmate4u.com/:splat"
  status = 301
  force = true

# Serve all HTML pages directly (Netlify auto-serves static files,
# but this ensures they're found before the catch-all 404)
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Block admin.html — return 404 and prevent public access
[[redirects]]
  from = "/admin.html"
  to = "/404.html"
  status = 404
  force = true

# SPA catch-all — 404 for unknown routes
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Security + Performance headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://checkout.razorpay.com https://cdn.razorpay.com https://*.razorpay.com https://unpkg.com https://fonts.googleapis.com https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://unpkg.com https://accounts.google.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://unpkg.com https://*.razorpay.com https://*.googleusercontent.com https://cdnjs.cloudflare.com https://raw.githubusercontent.com; connect-src 'self' data: https://taskearn-production-production.up.railway.app https://api.razorpay.com https://*.razorpay.com https://*.tile.openstreetmap.org https://nominatim.openstreetmap.org https://router.project-osrm.org https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com https://unpkg.com; frame-src https://api.razorpay.com https://checkout.razorpay.com https://*.razorpay.com https://accounts.google.com;"
    Cache-Control = "public, max-age=3600"

# Caching for static assets — versioned with ?v= query strings so 1-year cache is safe
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker must NEVER be cached — this MUST come AFTER *.js to override it
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# Manifest must not be cached so PWA install always sees latest version
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    # unsafe-none is the browser default, but Netlify's edge CDN can inject
    # same-origin for security hardening. Explicitly setting it restores the
    # permissive value that Google Sign-In popup mode requires: the GSI client
    # library calls window.postMessage() from accounts.google.com back to the
    # opener (workmate4u.com). With same-origin COOP that postMessage is blocked
    # and login silently fails (Chrome logs "would block the window.postMessage").
    Cross-Origin-Opener-Policy = "unsafe-none"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
