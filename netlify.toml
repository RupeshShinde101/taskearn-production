[build]
  # No build needed - using static HTML/CSS/JS
  publish = "."
  functions = "netlify/functions"

# Environment variables for production
[context.production.environment]
  # Set BACKEND_URL to your actual backend server (Railway, Render, etc)
  # IMPORTANT: Update this to your deployed backend URL
  # Example: BACKEND_URL = "https://taskearn-api.up.railway.app"
  BACKEND_URL = "https://taskearn-production-production.up.railway.app"

# Environment variables for deploy-preview
[context.deploy-preview.environment]
  BACKEND_URL = "https://taskearn-production-production.up.railway.app"

# Serve robots.txt and sitemap.xml directly
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

# API and dynamic routes - SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# SEO and security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Cache-Control = "public, max-age=3600"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Caching for static assets
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
