<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline – Workmate4u</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
        .offline-card { max-width: 360px; }
        .offline-icon { font-size: 72px; margin-bottom: 16px; }
        h1 { font-size: 22px; margin-bottom: 8px; }
        p { color: #64748b; margin-bottom: 24px; font-size: 15px; }
        .btn-retry { display: inline-block; background: linear-gradient(135deg,#7c3aed,#4f46e5); color: #fff; padding: 12px 28px; border-radius: 12px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; font-size: 15px; }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📶</div>
        <h1>You're Offline</h1>
        <p>Check your internet connection and try again. Your work is safe — tasks, wallet, and chats will sync when you're back online.</p>
        <button class="btn-retry" onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
