name: workmate4u
description: Workmate4u - India's leading freelance task marketplace
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # HTTP & networking
  http: ^1.2.1
  dio: ^5.4.3+1

  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Navigation
  go_router: ^13.2.4

  # Maps & location
  flutter_map: ^6.2.1
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # UI components
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_svg: ^2.3.0
  image_picker: ^1.1.2

  # Razorpay payments
  razorpay_flutter: ^1.3.6

  # Real-time (Socket.IO for chat)
  socket_io_client: ^2.0.3+1

  # Notifications
  flutter_local_notifications: ^21.0.0
  firebase_messaging: ^15.1.3
  firebase_core: ^3.5.0

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^12.0.2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.2
  qr_flutter: ^4.1.0
  pinput: ^3.0.1
  google_sign_in: ^6.2.2
  flutter_rating_bar: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
