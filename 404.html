<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#3b6dff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0b1020" media="(prefers-color-scheme: dark)">
    <title>Page Not Found - Workmate4u</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="mobile-enhancements.css?v=20260502_reviews">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192x192.png">
    <link rel="manifest" href="manifest.json">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            padding: 20px;
        }
        .error-content {
            text-align: center;
            max-width: 500px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 10px;
        }
        .error-content h2 {
            font-size: 1.8rem;
            color: var(--dark);
            margin-bottom: 15px;
        }
        .error-content p {
            color: var(--gray);
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .error-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .error-actions .btn {
            padding: 12px 28px;
            font-size: 1rem;
        }
    </style>
<script src="mobile-enhancements.js?v=20260502_findtasks" defer></script>
</head>
<body>
<script>if(localStorage.getItem('theme')==='dark'||(!localStorage.getItem('theme')&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.setAttribute('data-theme','dark');}</script>
    <div class="error-page">
        <div class="error-content">
            <div class="error-code">404</div>
            <h2>Page Not Found</h2>
            <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
            <div class="error-actions">
                <button class="dark-mode-toggle" onclick="toggleDarkMode()" title="Toggle dark mode"><i class="fas fa-moon"></i></button>
                <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
                <a href="browse.html" class="btn btn-outline"><i class="fas fa-search"></i> Browse Tasks</a>
                <a href="help.html" class="btn btn-outline"><i class="fas fa-question-circle"></i> Help</a>
            </div>
        </div>
    </div>
<script src="sw-register.js?v=20260420_recovery"></script>
</body>
</html>
