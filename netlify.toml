[build]
  # No build needed - using static HTML/CSS/JS
  publish = "."
  functions = "netlify/functions"

# Environment variables for production
[context.production.environment]
  # Set BACKEND_URL to your actual backend server (Railway, Render, etc)
  # IMPORTANT: Update this to your deployed backend URL
  # Example: BACKEND_URL = "https://taskearn-api.up.railway.app"
  BACKEND_URL = "https://taskearn-production-production.up.railway.app"

# Environment variables for deploy-preview
[context.deploy-preview.environment]
  BACKEND_URL = "https://taskearn-production-production.up.railway.app"

# API and dynamic routes - SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# CORS headers for all requests
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Cache-Control = "public, max-age=3600"

# Caching for static assets
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
