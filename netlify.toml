[build]
  # No build needed - using static HTML/CSS/JS
  publish = "."
  functions = "netlify/functions"

# Environment variables for production
[context.production.environment]
  BACKEND_URL = "https://taskearn-production-production.up.railway.app"

# Environment variables for deploy-preview
[context.deploy-preview.environment]
  BACKEND_URL = "https://taskearn-production-production.up.railway.app"

# Serve static files directly
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

# Serve all HTML pages directly (before SPA catch-all)
[[redirects]]
  from = "/*.html"
  to = "/:splat.html"
  status = 200

# SPA catch-all — 404 for unknown routes
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Security + Performance headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://checkout.razorpay.com https://unpkg.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://unpkg.com; connect-src 'self' https://taskearn-production-production.up.railway.app https://api.razorpay.com https://*.tile.openstreetmap.org https://router.project-osrm.org; frame-src https://api.razorpay.com https://checkout.razorpay.com;"
    Cache-Control = "public, max-age=3600"

# Caching for static assets
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
