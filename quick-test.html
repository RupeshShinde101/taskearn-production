<!DOCTYPE html>
<html>
<head>
    <title>Quick API Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e293b; color: #e2e8f0; }
        button { background: #6366f1; color: white; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #0f172a; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <h1>🔍 Quick API Debug</h1>
    <button onclick="testGetTasks()">1. Test GET /api/tasks</button>
    <button onclick="testPostWithToken()">2. Test POST with Token</button>
    <button onclick="testPostWithoutToken()">3. Test POST without Token</button>
    <button onclick="checkToken()">4. Check LocalStorage Token</button>
    <div id="output"></div>

    <script>
        const API_URL = null;
        const output = document.getElementById('output');

        function log(message, isError = false) {
            const color = isError ? 'error' : 'success';
            output.innerHTML += `<pre class="${color}">${message}</pre>`;
        }

        function checkToken() {
            output.innerHTML = '';
            const token = localStorage.getItem('taskearn_token');
            if (token) {
                log('✅ Token found in localStorage');
                log('Token (first 50 chars): ' + token.substring(0, 50) + '...');
            } else {
                log('❌ NO TOKEN in localStorage', true);
            }
        }

        async function testGetTasks() {
            output.innerHTML = '';
            log('Testing GET /api/tasks...');
            
            try {
                const response = await fetch(API_URL + '/tasks', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                log(`Response status: ${response.status}`);
                const data = await response.json();
                log('Response data: ' + JSON.stringify(data, null, 2));
                
                if (data.tasks) {
                    log(`✅ Found ${data.tasks.length} tasks`);
                }
            } catch (error) {
                log('❌ ERROR: ' + error.message, true);
                log('Error details: ' + JSON.stringify(error, null, 2), true);
            }
        }

        async function testPostWithoutToken() {
            output.innerHTML = '';
            log('Testing POST without token...');
            
            const taskData = {
                title: 'Test Task ' + new Date().toLocaleTimeString(),
                description: 'Test description',
                category: 'other',
                price: 100,
                location: { lat: 28.6139, lng: 77.2090, address: 'Delhi' }
            };
            
            try {
                const response = await fetch(API_URL + '/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(taskData)
                });
                
                log(`Response status: ${response.status}`);
                const data = await response.json();
                log('Response: ' + JSON.stringify(data, null, 2));
            } catch (error) {
                log('❌ ERROR: ' + error.message, true);
                log('Error name: ' + error.name, true);
                log('Error stack: ' + error.stack, true);
            }
        }

        async function testPostWithToken() {
            output.innerHTML = '';
            const token = localStorage.getItem('taskearn_token');
            
            if (!token) {
                log('❌ No token found. Please login first!', true);
                return;
            }
            
            log('Testing POST with token...');
            log('Using token: ' + token.substring(0, 30) + '...');
            
            const taskData = {
                title: 'Test Task ' + new Date().toLocaleTimeString(),
                description: 'Test description',
                category: 'other',
                price: 100,
                location: { lat: 28.6139, lng: 77.2090, address: 'Delhi' }
            };
            
            try {
                const response = await fetch(API_URL + '/tasks', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(taskData)
                });
                
                log(`Response status: ${response.status}`);
                const data = await response.json();
                log('Response: ' + JSON.stringify(data, null, 2));
                
                if (data.success) {
                    log('✅ SUCCESS! Task ID: ' + data.taskId);
                } else {
                    log('❌ Failed: ' + data.message, true);
                }
            } catch (error) {
                log('❌ FETCH ERROR: ' + error.message, true);
                log('Error name: ' + error.name, true);
                log('This usually means CORS or network issue', true);
            }
        }
    </script>
</body>
</html>
