[build]
  # Auto-stamp SW version on each deploy to bust caches
  command = "node -e \"const fs=require('fs');const v='v'+Date.now();const f=fs.readFileSync('sw.js','utf8');fs.writeFileSync('sw.js',f.replace(/workmate4u-v[0-9]+/,'workmate4u-'+v));\""
  publish = "."
  functions = "netlify/functions"

# Environment variables for production
[context.production.environment]
  BACKEND_URL = "https://taskearn-production-production.up.railway.app"

# Environment variables for deploy-preview
[context.deploy-preview.environment]
  BACKEND_URL = "https://taskearn-production-production.up.railway.app"

# 301 redirect: Netlify subdomain → custom domain (SEO canonical)
[[redirects]]
  from = "https://workmate4u.netlify.app/*"
  to = "https://www.workmate4u.com/:splat"
  status = 301
  force = true

# Serve static files directly
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

# Serve all HTML pages directly (before SPA catch-all)
[[redirects]]
  from = "/*.html"
  to = "/:splat.html"
  status = 200

# Root URL serves index.html
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# SPA catch-all — 404 for unknown routes
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Security + Performance headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://checkout.razorpay.com https://cdn.razorpay.com https://*.razorpay.com https://unpkg.com https://fonts.googleapis.com https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://unpkg.com https://accounts.google.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://unpkg.com https://*.razorpay.com https://*.googleusercontent.com; connect-src 'self' https://taskearn-production-production.up.railway.app https://api.razorpay.com https://*.razorpay.com https://*.tile.openstreetmap.org https://router.project-osrm.org https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com; frame-src https://api.razorpay.com https://checkout.razorpay.com https://*.razorpay.com https://accounts.google.com;"
    Cache-Control = "public, max-age=3600"

# Service worker must NEVER be cached — browser must always check for updates
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Caching for static assets
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
