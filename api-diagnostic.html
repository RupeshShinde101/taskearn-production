<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskEarn API Diagnostic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .test-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .test-section h3 {
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        
        .test-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .status-icon {
            font-size: 24px;
            min-width: 30px;
        }
        
        .test-info {
            flex: 1;
        }
        
        .test-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .test-result {
            font-size: 12px;
            color: #666;
            font-family: 'Courier New', monospace;
        }
        
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .warning { color: #f59e0b; }
        .info { color: #3b82f6; }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e5e7eb;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #d1d5db;
        }
        
        .console-output {
            background: #1f2937;
            color: #10b981;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #ccc;
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 TaskEarn API Diagnostic Tool</h1>
            <p>Test your backend API connection and diagnose login/signup issues</p>
        </div>
        
        <div class="test-section">
            <h3>📊 Connection Status</h3>
            <div id="statusContainer"></div>
            <div class="button-group">
                <button class="btn-primary" onclick="runAllTests()">🔄 Run All Tests</button>
                <button class="btn-secondary" onclick="clearConsole()">Clear Console</button>
            </div>
        </div>
        
        <div class="test-section">
            <h3>🧪 Manual API Tests</h3>
            <div class="button-group">
                <button class="btn-primary" onclick="testHealthCheck()">Health Check</button>
                <button class="btn-primary" onclick="testRegister()">Test Register</button>
                <button class="btn-primary" onclick="testLogin()">Test Login</button>
                <button class="btn-primary" onclick="testCORS()">Test CORS</button>
            </div>
        </div>
        
        <div class="test-section">
            <h3>📝 Console Output</h3>
            <div class="console-output" id="console"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://taskearn-production-production.up.railway.app/api';
        const consoleOutput = document.getElementById('console');
        
        // Custom console
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const prefix = {
                'info': 'ℹ️',
                'success': '✅',
                'error': '❌',
                'warning': '⚠️',
                'request': '📤',
                'response': '📥'
            }[type] || '•';
            
            console.log(`[${timestamp}] ${message}`);
            consoleOutput.innerHTML += `<div class="${type}">[${timestamp}] ${prefix} ${message}</div>`;
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        async function testHealthCheck() {
            log('Testing health check...', 'request');
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                log(`Health: ${response.status} - ${JSON.stringify(data)}`, response.ok ? 'success' : 'error');
                updateStatus('Health Check', response.ok, response.ok ? '✅ OK' : `❌ ${response.status}`);
            } catch (error) {
                log(`Health check failed: ${error.message}`, 'error');
                updateStatus('Health Check', false, `❌ ${error.message}`);
            }
        }
        
        async function testRegister() {
            log('Testing register endpoint...', 'request');
            const testData = {
                name: `Test User ${Date.now()}`,
                email: `test${Date.now()}@example.com`,
                password: 'Test12345',
                dob: '2000-01-01',
                phone: ''
            };
            
            try {
                log(`Sending: ${JSON.stringify(testData)}`, 'request');
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                const data = await response.json();
                log(`Register: ${response.status} - ${JSON.stringify(data)}`, response.ok ? 'success' : 'error');
                updateStatus('Register Endpoint', response.ok, response.ok ? '✅ OK' : `❌ ${response.status}`);
            } catch (error) {
                log(`Register test failed: ${error.message}`, 'error');
                updateStatus('Register Endpoint', false, `❌ ${error.message}`);
            }
        }
        
        async function testLogin() {
            log('Testing login endpoint...', 'request');
            const testData = {
                email: 'test@example.com',
                password: 'password'
            };
            
            try {
                log(`Sending: ${JSON.stringify(testData)}`, 'request');
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                const data = await response.json();
                log(`Login: ${response.status} - ${JSON.stringify(data)}`, response.status === 401 ? 'warning' : 'response');
                updateStatus('Login Endpoint', response.status !== 404, response.status === 401 ? '⚠️ Invalid credentials' : `✅ OK`);
            } catch (error) {
                log(`Login test failed: ${error.message}`, 'error');
                updateStatus('Login Endpoint', false, `❌ ${error.message}`);
            }
        }
        
        async function testCORS() {
            log('Testing CORS configuration...', 'request');
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'OPTIONS',
                    headers: {
                        'Origin': window.location.origin,
                        'Access-Control-Request-Method': 'POST'
                    }
                });
                const corsHeader = response.headers.get('Access-Control-Allow-Origin');
                log(`CORS: ${corsHeader || 'Not found'}`, corsHeader ? 'success' : 'warning');
                updateStatus('CORS Enabled', !!corsHeader, corsHeader ? `✅ ${corsHeader}` : '⚠️ May be restricted');
            } catch (error) {
                log(`CORS test failed: ${error.message}`, 'error');
                updateStatus('CORS Enabled', false, `❌ ${error.message}`);
            }
        }
        
        function updateStatus(testName, success, message) {
            const container = document.getElementById('statusContainer');
            const existing = container.querySelector(`[data-test="${testName}"]`);
            const icon = success ? '✅' : '❌';
            const html = `<div class="test-item" data-test="${testName}">
                <div class="status-icon">${icon}</div>
                <div class="test-info">
                    <div class="test-title">${testName}</div>
                    <div class="test-result">${message}</div>
                </div>
            </div>`;
            
            if (existing) {
                existing.outerHTML = html;
            } else {
                container.innerHTML += html;
            }
        }
        
        async function runAllTests() {
            log('=== Running all tests ===', 'info');
            await testHealthCheck();
            await new Promise(r => setTimeout(r, 500));
            await testRegister();
            await new Promise(r => setTimeout(r, 500));
            await testLogin();
            await new Promise(r => setTimeout(r, 500));
            await testCORS();
            log('=== All tests completed ===', 'info');
        }
        
        function clearConsole() {
            consoleOutput.innerHTML = '';
            log('Console cleared', 'info');
        }
        
        // Initial check
        window.addEventListener('load', () => {
            log(`API URL: ${API_URL}`, 'info');
            log(`Browser: ${navigator.userAgent}`, 'info');
            log('Click "Run All Tests" to diagnose', 'info');
        });
    </script>
</body>
</html>
