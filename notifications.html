    <style>
        .notif-page { padding: 90px 20px 100px; max-width: 700px; margin: 0 auto; }
        .notif-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .notif-header h1 { font-size: 1.8rem; color: var(--dark); }
        .notif-list { display: flex; flex-direction: column; gap: 10px; }
        .notif-item {
            background: var(--white); border-radius: var(--radius); padding: 18px 20px;
            box-shadow: var(--shadow); display: flex; gap: 15px; align-items: flex-start;
            transition: var(--transition); cursor: pointer; border-left: 4px solid transparent;
        }
        .notif-item:hover { box-shadow: var(--shadow-lg); }
        .notif-item.unread { background: #f0f4ff; border-left-color: var(--primary); }
        .notif-icon {
            width: 42px; height: 42px; border-radius: 10px; display: flex;
            align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0;
        }
        .notif-icon.task { background: #ede9fe; color: #7c3aed; }
        .notif-icon.payment { background: #dcfce7; color: #16a34a; }
        .notif-icon.wallet { background: #fef3c7; color: #d97706; }
        .notif-icon.system { background: #e0f2fe; color: #0284c7; }
        .notif-icon.warning { background: #fef2f2; color: #dc2626; }
        .notif-body { flex: 1; min-width: 0; }
        .notif-body p { color: var(--dark); font-size: 0.95rem; line-height: 1.4; margin-bottom: 4px; }
        .notif-body .notif-time { color: var(--gray-light); font-size: 0.8rem; }
        .notif-delete { color: var(--gray-light); font-size: 0.9rem; padding: 5px; cursor: pointer; opacity: 0; transition: 0.2s; }
        .notif-item:hover .notif-delete { opacity: 1; }
        .notif-delete:hover { color: var(--danger); }
        .notif-empty {
            text-align: center; padding: 80px 20px;
        }
        .notif-empty i { font-size: 4rem; color: var(--gray-light); margin-bottom: 15px; }
        .notif-empty h3 { color: var(--gray); margin-bottom: 8px; }
        .notif-empty p { color: var(--gray-light); }
        .notif-loading { text-align: center; padding: 60px 20px; color: var(--gray); }
        .notif-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .notif-tab {
            padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 500;
            border: 2px solid var(--light); background: var(--white); cursor: pointer;
            transition: var(--transition); color: var(--gray);
        }
        .notif-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .notif-tab:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
    </style>

    <script>
        var allNotifications = [];
        var currentFilter = 'all';

        function getNotifIcon(type) {
            var map = {
                'task_accepted': { icon: 'fa-check', cls: 'task' },
                'task_assigned': { icon: 'fa-thumbtack', cls: 'task' },
                'task_completed': { icon: 'fa-flag-checkered', cls: 'task' },
                'task_completed_helper': { icon: 'fa-clipboard-check', cls: 'task' },
                'task_posted': { icon: 'fa-clipboard-list', cls: 'task' },
                'task_released': { icon: 'fa-undo', cls: 'warning' },
                'task_expired': { icon: 'fa-clock', cls: 'warning' },
                'task_verify_sent': { icon: 'fa-hourglass-half', cls: 'task' },
                'task_final_completed': { icon: 'fa-trophy', cls: 'task' },
                'verify_and_pay': { icon: 'fa-check-circle', cls: 'task' },
                'payment_received': { icon: 'fa-rupee-sign', cls: 'payment' },
                'payment_released': { icon: 'fa-hand-holding-usd', cls: 'payment' },
                'payment_sent': { icon: 'fa-arrow-up', cls: 'payment' },
                'payment_done': { icon: 'fa-check-double', cls: 'payment' },
                'wallet_topup': { icon: 'fa-wallet', cls: 'wallet' },
                'withdrawal': { icon: 'fa-university', cls: 'payment' },
                'withdrawal_requested': { icon: 'fa-university', cls: 'payment' },
                'account_suspended': { icon: 'fa-ban', cls: 'warning' },
                'account_restored': { icon: 'fa-user-check', cls: 'task' },
                'account_banned': { icon: 'fa-gavel', cls: 'warning' },
                'penalty': { icon: 'fa-exclamation-triangle', cls: 'warning' },
                'system': { icon: 'fa-info-circle', cls: 'system' }
            };
            return map[type] || { icon: 'fa-bell', cls: 'system' };
        }

        function getNotifCategory(type) {
            if (type && (type.startsWith('task') || type === 'penalty')) return 'task';
            if (type && (type.startsWith('payment') || type.startsWith('wallet') || type === 'withdrawal' || type === 'withdrawal_requested')) return 'payment';
            if (type && (type.startsWith('account'))) return 'system';
            return 'system';
        }

        function timeAgo(date) {
            var diff = Date.now() - new Date(date).getTime();
            var mins = Math.floor(diff / 60000);
            if (mins < 1) return 'Just now';
            if (mins < 60) return mins + 'm ago';
            var hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            var days = Math.floor(hrs / 24);
            if (days < 7) return days + 'd ago';
            return new Date(date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
        }

        function renderNotifications() {
            var list = document.getElementById('notifList');
            var empty = document.getElementById('notifEmpty');
            var filtered = currentFilter === 'all' ? allNotifications :
                allNotifications.filter(function(n) { return getNotifCategory(n.notification_type || n.type) === currentFilter; });

            if (filtered.length === 0) {
                list.style.display = 'none';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';
            list.style.display = 'flex';

            list.innerHTML = filtered.map(function(n) {
                var ntype = n.notification_type || n.type;
                var ic = getNotifIcon(ntype);
                var data = typeof n.data === 'string' ? JSON.parse(n.data || '{}') : (n.data || {});
                var taskId = data.taskId || n.task_id || null;
                var title = n.title || 'Notification';
                var msg = n.message || data.message || 'You have a notification';
                var readStatus = (n.status === 'read' || n.read) ? '' : 'unread';

                // Determine navigation target on item click
                var navTarget = '';
                if (taskId) {
                    if (ntype === 'verify_and_pay') {
                        navTarget = 'posted.html?highlight=' + taskId + '&action=pay';
                    } else if (ntype === 'task_accepted' || ntype === 'task_assigned') {
                        navTarget = 'posted.html?highlight=' + taskId;
                    } else if (ntype === 'payment_released' || ntype === 'task_verify_sent' || ntype === 'task_final_completed') {
                        navTarget = 'index.html?tab=accepted-tasks';
                    } else if (ntype === 'payment_received' || ntype === 'payment_done') {
                        navTarget = 'wallet.html';
                    }
                }
                var onClickNav = navTarget ? 'markRead(' + n.id + '); window.location.href=\'' + navTarget + '\';' : 'markRead(' + n.id + ')';

                var actionBtn = '';
                if (data.taskId && (ntype === 'task_accepted' || (data.type === 'task'))) {
                    actionBtn = '<a href="posted.html?highlight=' + data.taskId + '" style="display:inline-block;margin-top:8px;background:#4ade80;color:#000;padding:8px 16px;border-radius:6px;font-weight:600;text-decoration:none;font-size:13px;" onclick="event.stopPropagation();"><i class="fas fa-eye"></i> View Helper</a>';
                }
                // Poster: Verify & Pay Now button (new flow)
                if (ntype === 'verify_and_pay' && data.taskId) {
                    actionBtn = '<button onclick="event.stopPropagation();verifyAndPay(' + data.taskId + ',' + (data.amount || 0) + ',this)" style="display:inline-block;margin-top:8px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;padding:10px 20px;border-radius:8px;font-weight:700;font-size:13px;border:none;cursor:pointer;"><i class="fas fa-check-circle"></i> ✅ Verify & Pay Now</button>';
                }
                // Helper: Mark as Completed button (after payment released) — calls API
                if (ntype === 'payment_released' && data.taskId) {
                    actionBtn = '<button onclick="event.stopPropagation();markCompletedFromNotif(' + data.taskId + ',this)" style="display:inline-block;margin-top:8px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;padding:10px 20px;border-radius:8px;font-weight:700;font-size:13px;border:none;cursor:pointer;"><i class="fas fa-flag-checkered"></i> 🎉 Mark as Completed</button>';
                }
                return '<div class="notif-item ' + readStatus + '" onclick="' + onClickNav + '">' +
                    '<div class="notif-icon ' + ic.cls + '"><i class="fas ' + ic.icon + '"></i></div>' +
                    '<div class="notif-body"><strong>' + title + '</strong><p>' + msg + '</p>' +
                    actionBtn +
                    '<span class="notif-time">' + timeAgo(n.created_at || n.timestamp) + '</span></div>' +
                    '<span class="notif-delete" onclick="event.stopPropagation();deleteNotif(' + n.id + ')" title="Delete"><i class="fas fa-times"></i></span>' +
                '</div>';
            }).join('');
        }

        function filterNotifs(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.notif-tab').forEach(function(t) { t.classList.remove('active'); });
            if (btn) btn.classList.add('active');
            renderNotifications();
        }

        async function loadNotifications() {
            var token = localStorage.getItem('taskearn_token');
            if (!token) {
                document.getElementById('notifLoading').style.display = 'none';
                document.getElementById('notifEmpty').style.display = 'block';
                return;
            }

            // Try server first; fall back to localStorage cache
            var fetched = false;
            try {
                var url = (window.API_BASE_URL || 'https://taskearn-production-production.up.railway.app/api') + '/notifications';
                var resp = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
                var data = await resp.json();
                if (data.success && Array.isArray(data.notifications)) {
                    allNotifications = data.notifications;
                    // Persist for offline fallback (keyed by user_id from JWT payload)
                    try {
                        var payload = JSON.parse(atob(token.split('.')[1]));
                        if (payload && payload.user_id) {
                            localStorage.setItem('notif_cache_' + payload.user_id, JSON.stringify(allNotifications));
                        }
                    } catch (_) {}
                    fetched = true;
                }
            } catch(e) {
                console.warn('Notifications load failed:', e.message);
            }

            // If fetch failed, try localStorage cache
            if (!fetched) {
                try {
                    var payload2 = JSON.parse(atob(token.split('.')[1]));
                    if (payload2 && payload2.user_id) {
                        var cached = localStorage.getItem('notif_cache_' + payload2.user_id)
                            || localStorage.getItem('notifications_' + payload2.user_id);
                        if (cached) {
                            var parsed = JSON.parse(cached);
                            // Convert app.js format ({title,message,createdAt}) to server format if needed
                            allNotifications = parsed.map(function(n) {
                                return {
                                    id: n.id,
                                    notification_type: n.type || 'system',
                                    title: n.title || 'Notification',
                                    message: n.message || '',
                                    status: n.read ? 'read' : 'unread',
                                    task_id: n.taskId || null,
                                    created_at: n.createdAt || n.created_at || new Date().toISOString(),
                                    data: n.action ? JSON.stringify(n.action) : null
                                };
                            });
                        }
                    }
                } catch (_) {}
            }

            document.getElementById('notifLoading').style.display = 'none';
            renderNotifications();
        }

        async function markRead(id) {
            try {
                var token = localStorage.getItem('taskearn_token');
                await fetch((window.API_BASE_URL || '') + '/notifications/' + id + '/read', {
                    method: 'POST', headers: { 'Authorization': 'Bearer ' + token }
                });
                var n = allNotifications.find(function(x) { return x.id === id; });
                if (n) n.read = true;
                renderNotifications();
            } catch(e) {}
        }

        async function deleteNotif(id) {
            try {
                var token = localStorage.getItem('taskearn_token');
                await fetch((window.API_BASE_URL || '') + '/notifications/' + id, {
                    method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token }
                });
                allNotifications = allNotifications.filter(function(x) { return x.id !== id; });
                renderNotifications();
            } catch(e) {}
        }

        async function clearAllNotifications() {
            try {
                var token = localStorage.getItem('taskearn_token');
                await fetch((window.API_BASE_URL || '') + '/notifications/clear-all', {
                    method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token }
                });
                allNotifications = [];
                renderNotifications();
            } catch(e) {}
        }

        // Poster pays for a verify_pending task from the notification button
        async function verifyAndPay(taskId, amount, btnEl) {
            if (!confirm('Release payment of ₹' + parseFloat(amount).toFixed(2) + ' to the helper?')) return;
            var token = localStorage.getItem('taskearn_token');
            if (!token) { alert('Please login first'); return; }
            if (btnEl) { btnEl.disabled = true; btnEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...'; }
            try {
                var resp = await fetch((window.API_BASE_URL || '') + '/tasks/' + taskId + '/pay-helper', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }
                });
                var result = await resp.json();
                if (result.success) {
                    alert('✅ Payment released! Helper will be notified to mark the task as completed.');
                    loadNotifications();
                } else {
                    alert(result.message || 'Payment failed. Please try again.');
                    if (btnEl) { btnEl.disabled = false; btnEl.innerHTML = '<i class="fas fa-check-circle"></i> ✅ Verify & Pay Now'; }
                }
            } catch(e) {
                alert('Network error. Please try again.');
                if (btnEl) { btnEl.disabled = false; btnEl.innerHTML = '<i class="fas fa-check-circle"></i> ✅ Verify & Pay Now'; }
            }
        }

        // Helper marks task as completed from the notification button
        async function markCompletedFromNotif(taskId, btnEl) {
            var token = localStorage.getItem('taskearn_token');
            if (!token) { alert('Please login first'); return; }
            if (!confirm('Mark this task as completed?')) return;
            if (btnEl) { btnEl.disabled = true; btnEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Completing...'; }
            var apiBase = window.API_BASE_URL || 'https://taskearn-production-production.up.railway.app/api';
            var proxyBase = '/.netlify/functions/api-proxy/api';
            try {
                var resp;
                try {
                    resp = await fetch(apiBase + '/tasks/' + taskId + '/mark-completed', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }
                    });
                } catch (netErr) {
                    resp = await fetch(proxyBase + '/tasks/' + taskId + '/mark-completed', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }
                    });
                }
                var result = await resp.json();
                if (result.success) {
                    alert('🏆 Task marked as completed! Great work!');
                    loadNotifications();
                } else {
                    alert(result.message || 'Could not mark as completed. Please try again.');
                    if (btnEl) { btnEl.disabled = false; btnEl.innerHTML = '<i class="fas fa-flag-checkered"></i> 🎉 Mark as Completed'; }
                }
            } catch(e) {
                alert('Network error. Please try again.');
                if (btnEl) { btnEl.disabled = false; btnEl.innerHTML = '<i class="fas fa-flag-checkered"></i> 🎉 Mark as Completed'; }
            }
        }

        loadNotifications();
    </script>
